<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>오프라인 — AI 업무 알림 서비스</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="theme-color" content="#3b82f6" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f8fafc;
        color: #1e293b;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        text-align: center;
      }

      .card {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 1.25rem;
        padding: 2.5rem 2rem;
        max-width: 22rem;
        width: 100%;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      }

      .icon-wrap {
        width: 4.5rem;
        height: 4.5rem;
        border-radius: 50%;
        background: #eff6ff;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
      }

      .icon-wrap svg {
        width: 2rem;
        height: 2rem;
        color: #3b82f6;
      }

      h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 0.625rem;
        letter-spacing: -0.01em;
      }

      p {
        font-size: 0.9rem;
        color: #64748b;
        line-height: 1.6;
        margin-bottom: 1.75rem;
      }

      button {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: #3b82f6;
        color: #ffffff;
        border: none;
        border-radius: 0.625rem;
        padding: 0.6875rem 1.5rem;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s, transform 0.1s;
        width: 100%;
        justify-content: center;
      }

      button:hover { background: #2563eb; }
      button:active { transform: scale(0.97); }

      button svg {
        width: 1rem;
        height: 1rem;
      }

      .tip {
        margin-top: 1.5rem;
        font-size: 0.78rem;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M18.364 5.636a9 9 0 010 12.728M15.536 8.464a5 5 0 010 7.072M5.636 18.364a9 9 0 010-12.728M8.464 15.536a5 5 0 010-7.072M12 12h.01" />
        </svg>
      </div>
      <h1>인터넷 연결이 필요합니다</h1>
      <p>현재 오프라인 상태입니다.<br>네트워크 연결을 확인한 후 다시 시도해 주세요.</p>
      <button onclick="location.reload()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        다시 시도
      </button>
      <p class="tip">캐시된 페이지는 오프라인에서도 계속 이용할 수 있습니다.</p>
    </div>
  </body>
</html>
